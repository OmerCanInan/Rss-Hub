# Build Trigger: 2026-04-17T17:10
name: "Gündemim Multi-Platform Build"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ==========================================
  # WINDOWS BUILD (Portable EXE)
  # ==========================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.1'
          check-latest: true
          
      - name: Clean Install
        shell: powershell
        run: |
          if (Test-Path package-lock.json) { Remove-Item package-lock.json -Force }
          npm install
        
      - name: Build Windows App
        run: npm run pack-win
        
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-exe
          path: pack/*.exe

  # ==========================================
  # ANDROID BUILD (APK)
  # ==========================================
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.1'
          check-latest: true
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Clean Install
        run: |
          rm -f package-lock.json
          npm install
        
      - name: Build Web Assets
        run: npm run build
        
      - name: Capacitor Sync Android
        run: npm run android-sync
        
      - name: Set Executable Permissions
        run: chmod +x android/gradlew
        
      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleDebug
        
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  # ==========================================
  # iOS BUILD (Preparation & Build Check)
  # ==========================================
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.1'
          check-latest: true
          
      - name: Clean Install
        run: |
          rm -f package-lock.json
          npm install
        
      - name: Build Web Assets
        run: npm run build
        
      - name: Capacitor Sync & Pods
        run: |
          npm run ios-sync
          cd ios/App && pod install
        
      - name: Build iOS Project (Check Only)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphoneos \
                     build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO