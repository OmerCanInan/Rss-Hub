# Build Trigger: 2026-04-17T17:38 - Final Professional Release
name: "Gündemim Multi-Platform Build"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ==========================================
  # WINDOWS BUILD (Portable EXE)
  # ==========================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.1'
          check-latest: true
          
      - name: Clean Install
        shell: powershell
        run: |
          if (Test-Path package-lock.json) { Remove-Item package-lock.json -Force }
          npm install
        
      - name: Build Windows App
        run: npm run pack-win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: pack/*.exe

  # ==========================================
  # ANDROID BUILD (APK)
  # ==========================================
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.1'
          check-latest: true
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          
      - name: Clean Install
        run: |
          npm install -g npm@latest
          rm -f package-lock.json
          npm install
        
      - name: Build Web Assets
        run: npm run build
        
      - name: Capacitor Sync Android
        run: npm run android-sync
        
      - name: Set Executable Permissions
        run: chmod +x android/gradlew
        
      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleDebug
        
      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/Gundemim-v0.1.0-B${{ github.run_number }}.apk
        
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-assets
          path: android/app/build/outputs/apk/debug/*.apk

  # ==========================================
  # iOS BUILD (Preparation & Build Check)
  # ==========================================
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.1'
          check-latest: true
          
      - name: Clean Install
        run: |
          npm install -g npm@latest
          rm -f package-lock.json
          npm install
        
      - name: Build Web Assets
        run: npm run build
        
      - name: Capacitor Sync (SPM)
        run: |
          # Create a dummy Podfile if it doesn't exist to satisfy Capacitor's sync check
          if [ ! -f ios/App/Podfile ]; then
            echo "platform :ios, '13.0'" > ios/App/Podfile
            echo "target 'App' do; end" >> ios/App/Podfile
          fi
          npm run ios-sync
        
      - name: Build iOS Project (Check Only)
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphoneos \
                     build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

  # ==========================================
  # FINAL RELEASE (Combine Everything)
  # ==========================================
  publish:
    needs: [build-windows, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Assets
        uses: actions/download-artifact@v4
        with:
          name: windows-assets
          path: release-assets
          
      - name: Download Android Assets
        uses: actions/download-artifact@v4
        with:
          name: android-assets
          path: release-assets
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: "Gündemim v0.1.0"
          body: |
            Gündemim RSS Okuyucu - İlk Profesyonel Yayın! 🚀
            
            **Yenilikler:**
            - "Gündemim" markası ve logosu tüm platformlara eklendi.
            - Windows için Kurulum (Setup) ve Taşınabilir (Portable) sürümler.
            - Android için APK dosyası (`Gundemim.apk`).
            - iOS için altyapı hazırlıkları tamamlandı.
          files: |
            release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}