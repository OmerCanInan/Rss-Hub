name: "Gündemim Multi-Platform Build"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ==========================================
  # WINDOWS BUILD (Portable EXE)
  # ==========================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.1'
          check-latest: true
          
      - name: Check Node Version
        run: node -v
          
      - name: Clean Install
        run: |
          if (Test-Path package-lock.json) { Remove-Item package-lock.json }
          npm install
        
      - name: Build Windows App
        run: npm run pack-win
        
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-exe
          path: pack/*.exe

  # ==========================================
  # ANDROID BUILD (APK)
  # ==========================================
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.1'
          check-latest: true
          
      - name: Check Node Version
        run: node -v
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Clean Install
        run: |
          rm -f package-lock.json
          npm install
        
      - name: Build Web Assets
        run: npm run build
        
      - name: Capacitor Sync Android
        run: npm run android-sync
        
      - name: Set Executable Permissions for Gradlew
        run: chmod +x android/gradlew
        
      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleDebug
        
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  # ==========================================
  # iOS BUILD (IPA - Preparation Only)
  # ==========================================
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.1'
          check-latest: true
          
      - name: Check Node Version
        run: node -v
          
      - name: Clean Install
        run: |
          rm -f package-lock.json
          npm install
        
      - name: Build Web Assets
        run: npm run build
        
      - name: Capacitor Sync iOS
        run: npm run ios-sync
        
      - name: Build iOS Project
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos build CODE_SIGNING_ALLOWED=NO
